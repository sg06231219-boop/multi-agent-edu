<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 多智能体协同学习平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--border:#1e2a42;--accent:#00d4aa;--accent2:#6c5ce7;--text:#e8edf5;--muted:#8892a8;--danger:#ff6b6b;--warn:#ffc107;--success:#00d4aa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#0a0e17,#131a2b,#1a1040);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.header-right{display:flex;align-items:center;gap:12px}
.header-right a{font-size:11px;color:var(--muted);text-decoration:none}.header-right a:hover{color:var(--accent)}

.main{padding:20px 24px;max-width:1200px;margin:0 auto}

/* 统计卡片 */
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* 系统信息 */
.sys-info{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:20px;display:flex;gap:20px;flex-wrap:wrap}
.sys-info .item{font-size:12px}.sys-info .item span{color:var(--muted)}.sys-info .item strong{margin-left:4px}

/* Agent状态 */
.agents-grid{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.agent-chip{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:11px;display:flex;align-items:center;gap:6px}
.agent-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.agent-chip .dot.idle{background:var(--muted)}

/* 会话列表 */
.section-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{background:rgba(0,0,0,.2)}
th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border)}
tr:last-child td{border:none}
tr:hover{background:rgba(0,212,170,.03)}

.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.status-badge.completed{background:rgba(0,212,170,.12);color:var(--success)}
.status-badge.running{background:rgba(0,212,170,.12);color:var(--accent);animation:pulse 1.5s infinite}
.status-badge.error{background:rgba(255,107,107,.12);color:var(--danger)}
.status-badge.pending{background:rgba(136,146,168,.12);color:var(--muted)}
.status-badge.cancelled{background:rgba(255,193,7,.12);color:var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.btn-sm{padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:10px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.danger:hover{border-color:var(--danger);color:var(--danger)}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}

/* 详情弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;padding:24px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal h3{font-size:15px;margin-bottom:14px}
.modal pre{background:var(--bg);padding:12px;border-radius:8px;font-size:11px;overflow-x:auto;max-height:400px;line-height:1.5}

/* 刷新按钮 */
.btn-refresh{padding:6px 14px;background:var(--accent);color:#000;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:transform .2s}
.btn-refresh:hover{transform:translateY(-1px)}
</style>
</head>
<body>

<div class="header">
  <div><h1>🛡️ 管理后台</h1></div>
  <div class="header-right">
    <a href="/">← 返回首页</a>
    <button class="btn-sm danger" onclick="doLogout()">退出登录</button>
  </div>
</div>

<div class="main">
  <!-- 统计 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="val" id="sTotal">-</div><div class="lbl">总会话</div></div>
    <div class="stat-card"><div class="val" id="sCompleted">-</div><div class="lbl">已完成</div></div>
    <div class="stat-card"><div class="val" id="sRunning">-</div><div class="lbl">运行中</div></div>
    <div class="stat-card"><div class="val" id="sFailed">-</div><div class="lbl">失败</div></div>
    <div class="stat-card"><div class="val" id="sRateLimit">-</div><div class="lbl">限流IP数</div></div>
  </div>

  <!-- 系统信息 -->
  <div class="sys-info" id="sysInfo">
    <div class="item"><span>版本：</span><strong id="sysVer">-</strong></div>
    <div class="item"><span>API Key：</span><strong id="sysKey">-</strong></div>
    <div class="item"><span>Agent数：</span><strong id="sysAgents">-</strong></div>
    <div class="item"><span>限流策略：</span><strong id="sysRate">-</strong></div>
  </div>

  <!-- Agent状态 -->
  <div class="section-title">🤖 Agent 状态</div>
  <div class="agents-grid" id="agentsGrid"></div>

  <!-- 会话列表 -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="section-title" style="margin:0">📋 会话记录</div>
    <button class="btn-refresh" onclick="loadAll()">🔄 刷新</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>ID</th><th>创建时间</th><th>状态</th><th>背景</th><th>Agent完成</th><th>耗时</th><th>操作</th></tr></thead>
      <tbody id="sessionsTbody"><tr><td colspan="7" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle">会话详情</h3>
    <pre id="modalBody"></pre>
  </div>
</div>

<script>
const BASE='';
let autoRefresh=null;

async function api(path,opts={}){
  const r=await fetch(BASE+path,{...opts,headers:{'Content-Type':'application/json',...opts.headers}});
  if(r.status===401){window.location.href='/admin';return null;}
  return r;
}

async function loadAll(){
  // Stats
  try{
    const r=await api('/api/admin/stats');
    if(!r)return;
    const d=await r.json();
    document.getElementById('sTotal').textContent=d.sessions.total;
    document.getElementById('sCompleted').textContent=d.sessions.completed;
    document.getElementById('sRunning').textContent=d.sessions.running;
    document.getElementById('sFailed').textContent=d.sessions.failed;
    document.getElementById('sRateLimit').textContent=d.rate_limiter.tracked_ips;
    document.getElementById('sysVer').textContent=d.version;
    document.getElementById('sysKey').textContent=d.api_key_configured?'✅ 已配置':'❌ 未配置';
    document.getElementById('sysAgents').textContent=d.agents.length;
    document.getElementById('sysRate').textContent=d.rate_limiter.max_per_minute+'/min';
  }catch(e){console.error(e);}

  // Agents
  try{
    const r=await api('/api/admin/agents');
    if(!r)return;
    const d=await r.json();
    const grid=document.getElementById('agentsGrid');
    grid.innerHTML=d.agents.map(a=>`<div class="agent-chip"><div class="dot ${a.has_result?'':'idle'}"></div>${a.name} · ${a.role}</div>`).join('');
  }catch(e){console.error(e);}

  // Sessions
  try{
    const r=await api('/api/admin/sessions?limit=50');
    if(!r)return;
    const d=await r.json();
    const tbody=document.getElementById('sessionsTbody');
    if(!d.sessions.length){tbody.innerHTML='<tr><td colspan="7" class="empty">暂无会话记录</td></tr>';return;}
    tbody.innerHTML=d.sessions.map(s=>{
      const bg=(s.profile&&s.profile.background||'-').substring(0,30);
      const cls=s.status;
      return `<tr>
        <td style="font-family:monospace;font-size:10px">${s.id}</td>
        <td>${(s.created_at||'').substring(5,19)}</td>
        <td><span class="status-badge ${cls}">${s.status}</span></td>
        <td title="${esc(s.profile&&s.profile.background||'')}">${esc(bg)}</td>
        <td>${s.agent_count||0}</td>
        <td>${s.total_seconds?s.total_seconds+'s':'-'}</td>
        <td>
          <button class="btn-sm" onclick="viewSession('${s.id}')">详情</button>
          <button class="btn-sm danger" onclick="delSession('${s.id}')">删除</button>
        </td>
      </tr>`;
    }).join('');
  }catch(e){console.error(e);}
}

async function viewSession(sid){
  const r=await api('/api/admin/sessions/'+sid);
  if(!r)return;
  const d=await r.json();
  document.getElementById('modalTitle').textContent='会话 '+sid;
  document.getElementById('modalBody').textContent=JSON.stringify(d,null,2);
  document.getElementById('detailModal').classList.add('show');
}

function closeModal(){document.getElementById('detailModal').classList.remove('show');}

async function delSession(sid){
  if(!confirm('确定删除会话 '+sid+'？'))return;
  await api('/api/admin/sessions/'+sid,{method:'DELETE'});
  loadAll();
}

async function doLogout(){
  await api('/api/admin/logout',{method:'POST'});
  window.location.href='/admin';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 点击弹窗外部关闭
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// 初始化
loadAll();
// 30秒自动刷新
autoRefresh=setInterval(loadAll,30000);
</script>
</body>
</html>
