services:
  - type: web
    name: multi-agent-edu
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.14.3"
      - key: ZHIPUAI_API_KEY
        sync: false
    healthCheckPath: /api/health
